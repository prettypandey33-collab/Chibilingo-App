            text-align: center;
            min-height: 260px;

// App State
let currentPage = 'home';
let currentCardIndex = 0;
let cardRevealed = false;
let shuffledWords = [];
let currentCategory = 'all';

let quizScore = 0;

// Helper Functions
function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
}

function getWordsByCategory(cat) {
    return cat === 'all' ? WORDS : WORDS.filter(w => w.cat === cat);
}

// Navigation
function switchPage(page) {
    currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    
    document.querySelectorAll('.nav-tabs button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === page);
    });

    if (page === 'learn') renderFlashcard();
    if (page === 'dictionary') filterDictionary();
    if (page === 'quiz') initQuiz();
}

    const w = shuffledWords[currentCardIndex];
    document.getElementById('fcKorean').textContent = w.k;
    document.getElementById('fcRoman').textContent = w.r;
    document.getElementById('fcEn').textContent = w.e;
    document.getElementById('fcHi').textContent = w.h;
    document.getElementById('fcTranslations').style.display = 'none';
    document.getElementById('fcHint').textContent = 'Tap to reveal';
    cardRevealed = false;
    document.getElementById('fcProgress').textContent = `${currentCardIndex + 1} / ${shuffledWords.length}`;
}

function revealTranslation() {
    const trans = document.getElementById('fcTranslations');
    if (!cardRevealed) {
        trans.style.display = 'block';
        document.getElementById('fcHint').textContent = 'Tap to hide';
    } else {
        trans.style.display = 'none';
        document.getElementById('fcHint').textContent = 'Tap to reveal';
    }
    cardRevealed = !cardRevealed;
}

function nextCard() {
    currentCardIndex = (currentCardIndex + 1) % shuffledWords.length;
    renderFlashcard();
}

function prevCard() {
    currentCardIndex = (currentCardIndex - 1 + shuffledWords.length) % shuffledWords.length;
    renderFlashcard();
}

// Dictionary
function filterDictionary() {
    const q = document.getElementById('dictInput').value.toLowerCase().trim();
    const list = document.getElementById('dictList');
    let results = q ? WORDS.filter(w => 
        w.k.toLowerCase().includes(q) || 
        w.r.toLowerCase().includes(q) || 
        w.e.toLowerCase().includes(q) || 
        w.h.toLowerCase().includes(q)
    ) : WORDS;

    let html = '';
    results.forEach(w => {
        html += `
            <div class="dict-item">
                <strong>${w.k}</strong> (${w.r})<br>
                <span style="color:#1e40af">🇬🇧 ${w.e}</span><br>
                <span style="color:#22c55e">🇮🇳 ${w.h}</span>
            </div>`;
    });
    list.innerHTML = html || '<p style="padding:20px; text-align:center; color:#888;">No words found</p>';
}

// Quiz
function initQuiz() {
    quizWords = shuffle(getWordsByCategory(currentCategory));
    quizIndex = 0;
    quizScore = 0;
    renderQuizQuestion();
}

function renderQuizQuestion() {
    if (quizIndex >= Math.min(10, quizWords.length)) {
        document.getElementById('quizQuestion').innerHTML = `🎉 Quiz Complete!<br>Score: ${quizScore}/${Math.min(10, quizWords.length)}`;
        document.getElementById('quizOptions').innerHTML = '';
        return;
    }

    const word = quizWords[quizIndex];
    document.getElementById('quizQuestion').textContent = word.k;
    document.getElementById('quizSub').textContent = 'Choose the correct meaning';

    let options = [word.e];
    let others = WORDS.filter(w => w.e !== word.e);
    others = shuffle(others).slice(0, 3);
    options = shuffle([...options, ...others.map(o => o.e)]);

    let html = '';
    options.forEach((opt, i) => {
        html += `<button onclick="answerQuiz(${i}, '${word.e}')">${opt}</button>`;
    });
    document.getElementById('quizOptions').innerHTML = html;
}

window.answerQuiz = function(selectedIdx, correct) {
    const buttons = document.querySelectorAll('#quizOptions button');
    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (btn.textContent === correct) btn.style.background = '#86efac';
        else if (i === selectedIdx) btn.style.background = '#fda4af';
    });

    if (buttons[selectedIdx].textContent === correct) quizScore++;
    document.getElementById('quizNext').disabled = false;
};

window.nextQuiz = function() {
    quizIndex++;
    renderQuizQuestion();
};

// Init everything
function init() {
    document.querySelectorAll('.nav-tabs button').forEach(btn => {
        btn.addEventListener('click', () => switchPage(btn.dataset.page));
    });

    // Initial load
    document.getElementById('wordCount').textContent = WORDS.length;
    document.getElementById('streakNum').textContent = "7"; // demo streak
    renderFlashcard();
    filterDictionary();
}

window.switchPage = switchPage;
window.revealTranslation = revealTranslation;
window.nextCard = nextCard;
window.prevCard = prevCard;
window.filterDictionary = filterDictionary;
window.initQuiz = initQuiz;
window.nextQuiz = nextQuiz;

// Start the app
init();
</script>

</body>
</html>
